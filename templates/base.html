<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Site{% endblock %}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial; background:#f3f4f6; padding:20px; }
    .container { max-width:900px; margin:0 auto; background:white; padding:24px; border-radius:8px; box-shadow:0 6px 18px rgba(0,0,0,0.08); }
    h1{margin-bottom:16px}
    .form-group{margin-bottom:12px}
    input, textarea, select{width:100%; padding:10px; border-radius:6px; border:1px solid #ddd; font-size:14px;}
    button{padding:10px 14px; border:none; border-radius:6px; background:#2563eb; color:white; cursor:pointer;}
    .card{padding:12px;border-radius:6px;background:#f8fafc;border-left:4px solid #2563eb;margin-bottom:12px;}
    .messages{list-style:none;padding:0;margin-bottom:12px}
    .message{padding:10px;border-radius:6px;margin-bottom:8px}
    .message.success{background:#d1fae5;color:#065f46}
    .message.error{background:#fee2e2;color:#7f1d1d}
    .nav-links{margin-top:12px}
    .small{font-size:13px;color:#6b7280}
  </style>
</head>
<body>
  <div class="container">
    {% if messages %}
      <ul class="messages">
        {% for m in messages %}
          <li class="message {{ m.tags }}">{{ m }}</li>
        {% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
