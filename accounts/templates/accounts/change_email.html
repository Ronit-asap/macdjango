{% extends 'base.html' %}
{% block title %}Change Email{% endblock %}

{% block content %}
<h1>Change Email</h1>

<form method="post">
  {% csrf_token %}

  {% if not otp_sent %}
    <div class="form-group">
      <label for="new_email">New Email Address</label>
      <input type="email" id="new_email" name="new_email" required placeholder="Enter new email">
    </div>
    <button type="submit" name="action" value="send_otp">Send OTP</button>
  {% else %}
    <div class="card">
      <h3>Verify Email OTP</h3>
      <p>OTP sent to terminal. Enter it below.</p>
    </div>
    <div class="form-group">
      <label for="otp">Email OTP (6 digits)</label>
      <input type="text" id="otp" name="otp" pattern="[0-9]{6}" maxlength="6" required placeholder="123456">
    </div>
    <button type="submit" name="action" value="verify">Verify & Update Email</button>
  {% endif %}

  <div class="nav-links" style="margin-top:16px;">
    <a href="{% url 'dashboard' %}">Back to Dashboard</a>
  </div>
</form>
{% endblock %}
